name: Deploy to Portainer

on:
  push:
    branches:
      - main
    paths:
      - "docker-compose.yml"
      - ".env.example"
      - "nginx/**"
      - ".github/workflows/deploy-portainer.yml"
      - "README.md"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Portainer stack webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "Missing PORTAINER_WEBHOOK_URL secret"
            exit 1
          fi

          curl -fsS -X POST "$PORTAINER_WEBHOOK_URL"

      - name: Deployment triggered
        run: echo "Portainer webhook called successfully."
