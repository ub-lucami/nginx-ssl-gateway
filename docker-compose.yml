services:
  nginx:
    build: .
    container_name: nginx-ssl-gateway
    restart: unless-stopped
    ports:
      - "${SSL_PORT:-8444}:443"
    volumes:
      - ${SSL_CERTS_PATH}:/etc/nginx/certs:ro            # must contain ${DEFAULT_CERT}/fullchain.pem and privkey.pem
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      # Backend (Kong) upstream (host:port)
      KONG_UPSTREAM: ${KONG_UPSTREAM:-kong:8000}
      # Folder name inside /etc/nginx/certs with fullchain.pem & privkey.pem
      DEFAULT_CERT: ${DEFAULT_CERT}
      # CORS (adjust as needed). Use space or comma separated domains if you want to allow multiple.
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://docker-alpine.lucami.org:3001}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET, POST, PUT, PATCH, DELETE, OPTIONS}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Authorization, apikey, x-client-info, Content-Type, x-upload-content-type, x-supabase-api-version}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      CORS_MAX_AGE: ${CORS_MAX_AGE:-3600}
    networks:
      - service_network

networks:
  service_network:
    external: true
    name: ${SERVICE_NETWORK:-supabase_default}

