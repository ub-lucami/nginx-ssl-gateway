services:
  nginx:
    build: .
    container_name: nginx-ssl-gateway
    restart: unless-stopped
    ports:
      - "${SSL_PORT:-8444}:443"
    volumes:
      - ${SSL_CERTS_PATH}:/etc/nginx/certs:ro
    environment:
      KONG_UPSTREAM: ${KONG_UPSTREAM:-kong:8000}
      DEFAULT_CERT: ${DEFAULT_CERT}
      CERT_CHECK_INTERVAL: ${CERT_CHECK_INTERVAL:-60}
    networks:
      - service_network

networks:
  service_network:
    external: true
    name: ${SERVICE_NETWORK:-supabase_default}