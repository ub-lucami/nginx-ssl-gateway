worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ====================== CORS Configuration ======================
    # This applies to all requests going through Nginx → Kong
    add_header 'Access-Control-Allow-Origin' 'https://docker-alpine.lucami.org:3001' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, x-client-info, Content-Type, x-upload-content-type, x-supabase-api-version' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Max-Age' '3600' always;

    # Handle preflight (OPTIONS) requests properly — critical for Storage uploads
    server {
        listen 80;                    # Change to 443 ssl; if you use HTTPS
        server_name docker-alpine.lucami.org;   # ← put your domain here

        # Special handling for OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://docker-alpine.lucami.org:3001' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, x-client-info, Content-Type, x-upload-content-type, x-supabase-api-version' always;
            add_header 'Access-Control-Max-Age' '3600' always;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        location / {
            proxy_pass http://kong:8000;     # ← your current proxy to Kong

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Important for large video recordings (.webm files)
            client_max_body_size 500M;
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }

    # Optional: Include your other conf files if needed
    include /etc/nginx/conf.d/*.conf;
}
